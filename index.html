<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        .container { max-width: 800px; margin: auto; font-family: Arial; }
        .audit-box { border: 1px solid #ccc; padding: 20px; margin-top: 20px; border-radius: 8px; }
        .wrong { color: #d9534f; text-decoration: line-through; }
        .correct { color: #5cb85c; font-weight: bold; }
        .suggestion { background: #f0f8ff; padding: 10px; border-left: 5px solid #007bff; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Band 9 IELTS Clinical Auditor</h2>
        <label>Competency:</label>
        <select id="compSelector" onchange="updatePrompt()">
            <option value="inversion">Inversions (Rarely/Not Only)</option>
            <option value="subjunctive">Advanced Subjunctive (Had/Were)</option>
            <option value="register">Academic Register (Nominalization)</option>
        </select>
        
        <p id="promptDisplay"></p>
        <textarea id="userInput" style="width:100%; height:80px;"></textarea>
        <button onclick="auditPerformance()">Audit Performance</button>
        
        <div id="auditResult" class="audit-box"></div>
    </div>

<script>
const drillData = {
    inversion: {
        prompt: "Rewrite: 'If the nurse does not check the patient, the error is rarely found early.'",
        req: ["rarely is", "assessment"],
        suggestion: "Rarely is an error detected early if the nurse fails to perform a thorough patient assessment."
    },
    subjunctive: {
        prompt: "Rewrite: 'If the staff had received training, they would have been prepared.'",
        req: ["had", "been"],
        suggestion: "Had the staff received continuous professional development, they would have been better prepared."
    }
};

function updatePrompt() {
    document.getElementById('promptDisplay').innerText = drillData[document.getElementById('compSelector').value].prompt;
}

function auditPerformance() {
    const input = document.getElementById('userInput').value.toLowerCase();
    const comp = document.getElementById('compSelector').value;
    const data = drillData[comp];
    
    let score = 0;
    data.req.forEach(r => { if(input.includes(r)) score += 3; });
    
    let band = score >= 6 ? "Band 9 (Masterful)" : (score >= 3 ? "Band 7 (Proficient)" : "Band 6 (Functional)");
    
    document.getElementById('auditResult').innerHTML = `
        <strong>Scoring Audit: ${band}</strong>
        <div class="suggestion">
            <strong>Suggested Band 9 Hit:</strong><br>${data.suggestion}
        </div>
    `;
}
updatePrompt();
</script>
</body>
</html>
