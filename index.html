<!DOCTYPE html>
<html>
<body>
    <select id="compSelector" onchange="updatePrompt()">
        <option value="inversion">Inversions (Negative Fronting)</option>
        <option value="subjunctive">Advanced Subjunctive (Had...)</option>
        <option value="discourse">Logical Connectors & Discourse Joints</option>
    </select>

    <p id="promptDisplay">Loading...</p>
    <textarea id="userInput"></textarea>
    <button onclick="auditAll()">Audit Performance</button>
    <div id="feedback"></div>

<script>
const data = {
    inversion: {
        prompt: "Rewrite: 'If the nurse does not check the patient, the error is rarely found early.'",
        targets: ["rarely is", "assessment"],
        collocations: ["thorough patient assessment", "clinical protocol"]
    },
    discourse: {
        prompt: "Link these: 'Renewable energy reduces carbon emissions' and 'It creates new jobs.'",
        targets: ["not only", "but also", "thereby"],
        collocations: ["carbon footprint", "economic viability"]
    }
};

function updatePrompt() {
    const comp = document.getElementById('compSelector').value;
    document.getElementById('promptDisplay').innerText = data[comp].prompt;
}

function auditAll() {
    const input = document.getElementById('userInput').value.toLowerCase();
    const comp = document.getElementById('compSelector').value;
    let score = 0;
    
    // Multi-dimensional Scoring Logic
    data[comp].targets.forEach(t => { if(input.includes(t)) score += 2; });
    data[comp].collocations.forEach(c => { if(input.includes(c)) score += 1; });

    // Band Level Mapping
    let band = score >= 5 ? "Band 9" : (score >= 3 ? "Band 7" : "Band 6");
    
    document.getElementById('feedback').innerHTML = `
        <strong>Result: ${band}</strong><br>
        <em>Critique:</em> ${score >= 5 ? "Masterful use of syntactic architecture." : "Consider integrating more domain-specific collocations."}
    `;
}
updatePrompt();
</script>
</body>
</html>
