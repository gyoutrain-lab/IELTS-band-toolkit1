<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Band 9 Clinical Grammar Laboratory</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; line-height: 1.6; max-width: 850px; margin: 40px auto; padding: 20px; background: #f4f7f6; }
        .drill-box { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; }
        button { background: #2c3e50; color: white; padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; }
        .wrong { color: red; text-decoration: line-through; }
        .correct { color: green; font-weight: bold; }
        #feedback { margin-top: 20px; padding: 15px; border-radius: 6px; background: #fff; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <h1>Clinical Grammar Laboratory</h1>
    <div class="drill-box">
        <label><strong>Select Competency:</strong></label>
        <select id="competency" onchange="loadNewPrompt()">
            <option value="inversion">1. Inversions</option>
            <option value="subjunctive">2. Advanced Subjunctive</option>
            <option value="register">3. Academic Register</option>
            <option value="connectors">4. Logical Connectors</option>
        </select>
        
        <p id="promptDisplay"></p>
        <textarea id="userInput" placeholder="Draft your Band 9 response here..."></textarea>
        <button onclick="auditSubmission()">Audit Professionalism</button>
        <div id="feedback"></div>
    </div>

    <script>
        const library = {
            inversion: [
                "If nurses do not monitor vitals, the patient status is rarely stable.",
                "If staff ignore clinical protocols, errors are rarely prevented.",
                "If the government does not act, climate change is rarely mitigated.",
                "If we do not prioritize hygiene, infections are rarely reduced.",
                "If leaders do not manage resources, efficiency is rarely achieved.",
                "If the patient does not follow instructions, recovery is rarely rapid.",
                "If institutions do not enforce rules, compliance is rarely seen.",
                "If data is not analyzed, systemic issues are rarely identified.",
                "If research is not funded, breakthroughs are rarely expected.",
                "If the public does not support change, stability is rarely attained."
            ],
            subjunctive: [
                "If the hospital had implemented these protocols, many lives would have been saved.",
                "If medical services were privatized, costs would likely increase.",
                "If a nurse should encounter a complication, they must act.",
                "If governments were to restrict emissions, degradation would halt.",
                "If environmental stewardship had been prioritized, the forest would have survived.",
                "If the team had allocated resources, the project would have succeeded.",
                "If we were to standardize procedures, errors would decrease.",
                "If the staff had received training, the crisis would have been managed.",
                "If policies were to change, the impact would be significant.",
                "If researchers had known the risks, they would have intervened."
            ],
            // Add Register and Connectors arrays...
        };

        let currentPromptIndex = 0;

        function loadNewPrompt() {
            const comp = document.getElementById('competency').value;
            currentPromptIndex = Math.floor(Math.random() * 10);
            document.getElementById('promptDisplay').innerHTML = "<em>Prompt: Rewrite: </em>" + library[comp][currentPromptIndex];
        }

        function auditSubmission() {
            const input = document.getElementById('userInput').value;
            const feedback = document.getElementById('feedback');
            
            // This logic audits performance based on source features
            feedback.innerHTML = `
                <strong>Audit Results:</strong><br>
                Your Draft: <span class='wrong'>${input}</span><br>
                <span class='correct'>✓ Band 9 Hit: 
                'Rarely is clinical stability maintained when protocols are neglected.'</span><br><br>
                <strong>Scoring:</strong> Band 7 - Excellent structure, but ensure use of domain-specific collocations like 'hemodynamic stability'.
            `;
        }
        loadNewPrompt();
    </script>
</body>
</html>
