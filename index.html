<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Band 9 Clinical Grammar Laboratory</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; line-height: 1.6; max-width: 850px; margin: 40px auto; padding: 20px; background: #f4f7f6; }
        .drill-box { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; }
        button { background: #2c3e50; color: white; padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; }
        .correct { color: green; font-weight: bold; }
        .wrong { color: red; text-decoration: underline; }
        #feedback { margin-top: 20px; padding: 15px; border-radius: 6px; background: #fff; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <h1>Clinical Grammar Laboratory</h1>
    <div class="drill-box">
        <label><strong>Select Competency:</strong></label>
        <select id="competency" onchange="updatePrompt()">
            <option value="inversion">1. Inversions (Rarely/Not Only)</option>
            <option value="subjunctive">2. Advanced Subjunctive (Had/Were)</option>
            <option value="register">3. Academic Register (Nominalization)</option>
            <option value="connectors">4. Logical Connectors (Not only/but also)</option>
        </select>
        
        <p id="promptDisplay"><em>Loading prompt...</em></p>
        <textarea id="userInput" placeholder="Draft your Band 9 response here..."></textarea>
        <button onclick="auditSubmission()">Audit Professionalism</button>
        <div id="feedback"></div>
    </div>

    <script>
        const library = {
            inversion: [
                "If nurses do not monitor vitals, the patient status is rarely stable.",
                "If the hospital enforced strict rules, errors would rarely happen.",
                "If we had identified the risk earlier, the crisis would rarely have occurred.",
                "If the team did not follow the protocol, outcomes were rarely positive.",
                "If government authorities regulated carbon emissions, biodiversity would rarely be threatened.",
                "If staff did not document the procedure, legal risks would rarely be mitigated.",
                "If the patient did not receive timely care, survival would rarely be guaranteed.",
                "If researchers did not analyze the data, systemic failure would rarely be understood.",
                "If nurses did not prioritize hygiene, infections would rarely be prevented.",
                "If policymakers did not enact reforms, ecological stability would rarely be achieved."
            ],
            subjunctive: [
                "If the hospital had implemented these protocols earlier, lives would have been saved.",
                "If medical services were privatized, the cost of healthcare would increase.",
                "If a nurse encounters a complication, they must follow the protocol.",
                "If the government had prioritized stewardship, the forest would have survived.",
                "If the team had allocated resources efficiently, the project would have succeeded.",
                "If clinical guidelines were strictly followed, errors would be minimized.",
                "If the patient had received the assessment, the diagnosis would be clear.",
                "If the community had separated waste, recycling would have been facilitated.",
                "If management had provided development, staff would have been prepared.",
                "If we had mitigated the risk, the impact would have been lower."
            ],
            // ... (Add register and connectors arrays similarly)
        };

        function updatePrompt() {
            const comp = document.getElementById('competency').value;
            const prompts = library[comp] || ["Generic prompt here."];
            document.getElementById('promptDisplay').innerHTML = "<em>Prompt: Rewrite: </em>" + prompts[0];
        }

        function auditSubmission() {
            const input = document.getElementById('userInput').value.toLowerCase();
            const feedback = document.getElementById('feedback');
            
            let score = 0;
            if(input.includes("rarely") || input.includes("had") || input.includes("assessment")) score = 9;
            
            feedback.innerHTML = score >= 9 ? 
                "<span class='correct'>✓ Band 9: Masterful use of syntactic architecture and collocations.</span>" : 
                "<span class='wrong'>✗ Band 6: Functional, but lacks advanced academic register and logical flow.</span>";
        }
        
        updatePrompt();
    </script>
</body>
</html>
